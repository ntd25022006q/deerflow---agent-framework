name: Deerflow Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript strict check
        run: bun run type-check

      - name: Run tests
        run: bun run test

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Check coverage thresholds
        run: |
          COVERAGE=$(bun run test:coverage 2>&1 | tail -20)
          echo "$COVERAGE"
          if ! echo "$COVERAGE" | grep -q "Statements.*[89][0-9]\.\|100\.0"; then
            echo "::error::Statement coverage below 80%"
            exit 1
          fi

  security-scan:
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Deerflow security validation
        run: bash scripts/validate.sh --security --verbose || true

      - name: Check for hardcoded secrets
        run: |
          if rg -l "api[_-]?key\s*[:=]\s*['\"][a-zA-Z0-9]{16,}" --type ts --type tsx src/ 2>/dev/null; then
            echo "::error::Hardcoded API keys detected"
            exit 1
          fi
          echo "No hardcoded secrets found"
